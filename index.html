<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Miner — Earn Smart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
:root{
  --bg:#0a0d12;
  --card:#111723;
  --primary:#00d4ff;
  --text:#eaf2f8;
  --sub:#7c8b99;
}

body{
  margin:0;
  background:var(--bg);
  font-family:sans-serif;
  color:var(--text);
}

/* HEADER */
.header{
  text-align:center;
  padding:14px;
  font-weight:bold;
  color:var(--primary);
}

/* BALANCE */
.balance{
  margin:12px;
  padding:18px;
  border-radius:14px;
  background:linear-gradient(135deg,#00d4ff,#0077ff);
  text-align:center;
  color:#000;
}
.balance h2{margin:0}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  font-weight:bold;
  cursor:pointer;
}

.btn.alt{
  background:#1e293b;
  color:#fff;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#0f1620;
}

.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:var(--sub);
}

.nav .active{
  color:var(--primary);
}

/* TASK AREA */
#taskArea{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">⚡ Nova Miner</div>

<!-- HOME -->
<div id="homePage">

<div class="balance">
  <div>Total Balance</div>
  <h2>$<span id="balance">0.000000</span></h2>
</div>

<div class="grid">

<div class="card">
  <div>Today's Earnings</div>
  <h3 id="today">0.000000</h3>
</div>

<div class="card">
  <div>Credits</div>
  <h3 id="credits">20</h3>
</div>

<div class="card">
  <button class="btn" onclick="claimCredits()">🎁 Claim Credits</button>
</div>

<div class="card">
  <button class="btn alt" onclick="watchAd()">🎥 Watch Ad (Optional Bonus)</button>
</div>

<div class="card" style="grid-column: span 2;">
  <button class="btn alt" onclick="startBonus()">🚀 Start Bonus Tasks</button>
  <div id="taskArea"></div>
</div>

</div>
</div>

<!-- WALLET -->
<div id="walletPage" style="display:none;padding:10px;">
<div class="card">
<h3>Withdraw</h3>

<select id="method">
<option>Bank</option>
<option>Litecoin</option>
<option>Opay</option>
<option>Payeer</option>
</select>

<input id="details" placeholder="Enter details">

<button class="btn" onclick="withdraw()">Withdraw</button>
</div>
</div>

<!-- INFO -->
<div id="infoPage" style="display:none;padding:10px;">
<div class="card">
<p style="color:var(--sub)">
This app allows you to earn by mining and optional ads.
Watching ads is not required but gives bonus rewards.
</p>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button class="active" onclick="showPage('homePage',this)">Home</button>
<button onclick="showPage('walletPage',this)">Wallet</button>
<button onclick="showPage('infoPage',this)">Info</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* STATE */
let state = {
  balance: Number(localStorage.balance)||0,
  today: Number(localStorage.today)||0,
  credits: Number(localStorage.credits)||20
};

function save(){
  localStorage.balance = state.balance;
  localStorage.today = state.today;
  localStorage.credits = state.credits;
}

/* UI */
function render(){
  document.getElementById("balance").textContent = state.balance.toFixed(6);
  document.getElementById("today").textContent = state.today.toFixed(6);
  document.getElementById("credits").textContent = state.credits;
}

/* NAV */
function showPage(page,btn){
  homePage.style.display="none";
  walletPage.style.display="none";
  infoPage.style.display="none";

  document.getElementById(page).style.display="block";

  document.querySelectorAll(".nav button")
  .forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

/* MINING (FREE) */
setInterval(()=>{
  state.balance += 0.000001;
  state.today += 0.000001;
  render();
  save();
},1000);

/* ADSGRAM */
const ad = Adsgram.init({blockId:"27164"});

/* WATCH AD (OPTIONAL) */
function watchAd(){
  ad.show().then(res=>{
    if(res.done){
      state.balance += 0.002;
      state.credits += 5;
      render();
      save();
      alert("🎉 Bonus received!");
    }
  });
}

/* CLAIM (NO ADS REQUIRED) */
function claimCredits(){
  let reward = (Math.random()*3 + 2).toFixed(2);

  state.credits += Number(reward);
  render();
  save();

  alert("You earned " + reward + " credits!");

  document.getElementById("taskArea").innerHTML = `
  <button class="btn alt" onclick="watchAd()">
    🎥 Watch Ad for EXTRA reward
  </button>`;
}

/* BONUS TASKS (OPTIONAL ADS) */
const tasks = ["task-27165","task-27166","task-27167","task-27168"];
let step = 0;

function startBonus(){
  step = 0;
  loadTask();
}

function loadTask(){
  if(step >= 4){
    state.credits += 40;
    render();
    save();
    taskArea.innerHTML="";
    alert("🎉 Bonus Completed!");
    return;
  }

  const id = tasks[Math.floor(Math.random()*tasks.length)];

  taskArea.innerHTML = `
  <div>Task ${step+1}/4</div>
  <adsgram-task data-block-id="${id}"></adsgram-task>
  <button id="nextBtn" class="btn" style="margin-top:10px;display:none;">Next</button>
  `;

  let done=false;

  taskArea.querySelector("adsgram-task")
  .addEventListener("reward",()=>{
    done=true;
    document.getElementById("nextBtn").style.display="block";
  },{once:true});

  document.getElementById("nextBtn").onclick = ()=>{
    if(!done) return alert("Complete task first");
    step++;
    loadTask();
  };
}

/* WITHDRAW */
function withdraw(){
  if(state.balance < 10){
    alert("Minimum withdrawal is $10");
    return;
  }
  alert("Withdrawal request sent");
}

render();
</script>

</body>
</html>
