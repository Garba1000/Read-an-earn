<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Read and Earn Bot</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Roboto",sans-serif;}
body{background:#000;color:white;padding:20px;padding-top:120px;}
.header{position:fixed;top:0;width:100%;background:#000;display:flex;justify-content:space-between;align-items:center;padding:15px 20px;z-index:100;}
.header h1{font-size:24px;}
.button-container{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
.btn{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;}
.read-btn{background:#007bff;color:white;}
.task-btn{background:#ffc107;color:black;}
.watch-btn{background:#28a745;color:white;}
.withdraw-btn{background:#6f42c1;color:white;}
.referral-btn{background:#fd7e14;color:white;}
.article-container{background:#222;padding:12px;border-radius:12px;overflow-y:auto;max-height:60vh;}
#commentSection{margin-top:15px;}
#commentBox, #submitComment{display:block;margin-top:10px;padding:8px;border-radius:6px;border:1px solid #555;background:#111;color:white;width:100%;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;padding:20px;border-radius:12px;z-index:200;max-width:400px;width:90%;text-align:center;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#28a745;color:white;padding:10px 20px;border-radius:8px;opacity:0;transition:opacity 0.5s;}
.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="header">
<h1>EarnZone Bot</h1>
<div id="pointsDisplay">Balance: 0 pts</div>
</div>

<div class="button-container">
<button class="btn read-btn" onclick="openArticle()">Read & Earn</button>
<button class="btn task-btn" onclick="showTaskAd()">Complete Ad Task (+Reward)</button>
<button class="btn watch-btn" onclick="showWatchAd()">Watch Ad (+Reward)</button>
<button class="btn withdraw-btn" onclick="openWithdraw()">Withdraw</button>
<button class="btn referral-btn" onclick="copyReferral()">Referral</button>
</div>

<div class="article-container" id="articleContainer"></div>

<div id="commentSection" style="display:none;">
<textarea id="commentBox" placeholder="Write a comment..."></textarea>
<button id="submitComment" class="btn read-btn" onclick="submitComment()">Submit Comment</button>
</div>

<!-- Withdraw -->
<div class="popup" id="withdrawPopup" style="display:none;">
<h2>Withdraw Balance</h2>
<p>Your balance: <span id="withdrawPoints">0</span> pts</p>

<select id="withdrawMethod">
<option value="payeer">Payeer</option>
<option value="skrill">Skrill</option>
<option value="wire">Wire Transfer</option>
<option value="usdt">USDT TRC20</option>
</select>

<input id="withdrawDetails" placeholder="Account / Wallet details">
<button class="btn withdraw-btn" onclick="submitWithdraw()">Send Request</button>
<button onclick="closeWithdraw()">Close</button>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp ?? {};
tg.expand();

// ===== BALANCE =====
let userBalance = parseInt(localStorage.getItem('userBalance')) || 0;
updateBalance();

function updateBalance(){
  document.getElementById('pointsDisplay').innerText = `Balance: ${userBalance} pts`;
}
function saveBalance(){
  localStorage.setItem('userBalance', userBalance);
  updateBalance();
}

// ===== TOAST =====
function showToast(msg){
  const t=document.getElementById('toast');
  t.innerText=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ===== ADS INIT (NO AUTO SHOW) =====
const rewardAd = window.Adsgram.init({ blockId: "21443" });

// ===== SMART SYSTEM =====
let adCooldown = false;
let adCount = parseInt(localStorage.getItem("adCount")) || 0;
let lastReset = localStorage.getItem("lastReset") || Date.now();
const DAILY_LIMIT = 20;

if (Date.now() - lastReset > 86400000) {
  adCount = 0;
  localStorage.setItem("lastReset", Date.now());
  localStorage.setItem("adCount", adCount);
}

function getRandomReward(){
  return Math.floor(Math.random() * 71) + 80; // 80 -150
}

// ===== WATCH AD =====
function showWatchAd(){

  if(adCooldown) return showToast("⏳ Wait for cooldown...");
  if(adCount >= DAILY_LIMIT) return showToast("🚫 Daily limit reached");

  let timeLeft = 5;
  showToast("⏳ Starting in 5s");

  const countdown = setInterval(()=>{
    timeLeft--;
    if(timeLeft > 0){
      showToast("⏳ " + timeLeft + "s...");
    } else {
      clearInterval(countdown);

      showToast("🔄 Processing...");

      rewardAd.show().then(res=>{
        if(res.done){
          let reward = getRandomReward();
          userBalance += reward;
          saveBalance();

          adCount++;
          localStorage.setItem("adCount", adCount);

          showToast(`✅ +${reward} pts earned`);
        }
      }).catch(()=>showToast("❌ Ad failed"));

      adCooldown = true;
      setTimeout(()=>adCooldown=false,10000);
    }
  },1000);
}

// ===== TASK SYSTEM =====
let taskInProgress = false;
const taskBlocks = ["task-21450","task-21446","task-21449"];

function showTaskAd(){

  if(taskInProgress) return showToast("Finish current task first");
  if(adCount >= DAILY_LIMIT) return showToast("Daily limit reached");

  taskInProgress = true;

  const blockId = taskBlocks[Math.floor(Math.random()*taskBlocks.length)];
  const container = document.createElement('div');
  container.innerHTML = `<adsgram-task data-block-id="${blockId}"></adsgram-task>`;
  document.body.appendChild(container);

  const el = container.querySelector('adsgram-task');

  el.addEventListener('reward', () => {

    let reward = getRandomReward();
    userBalance += reward;
    saveBalance();

    adCount++;
    localStorage.setItem("adCount", adCount);

    showToast(`✅ Task done +${reward}`);

    container.remove();
    taskInProgress = false;

  }, {once:true});
}

// ===== ARTICLE =====
function openArticle(){
  document.getElementById('articleContainer').innerHTML = "<h2>Earn Online Guide</h2><p>Read and earn safely.</p>";
  document.getElementById('commentSection').style.display='block';
}

// ===== COMMENT =====
function submitComment(){
  let txt=document.getElementById("commentBox").value.trim();
  if(!txt) return showToast("Write something");
  if(userBalance < 6000) return showToast("Need 6000 pts");

  userBalance -= 6000;
  saveBalance();
  showToast("Comment submitted");
}

// ===== REFERRAL =====
function copyReferral(){
  let ref="https://t.me/Earnzonesbot?start="+Math.floor(Math.random()*99999);
  navigator.clipboard.writeText(ref);
  showToast("Copied!");
}

// ===== WITHDRAW =====
const MIN_WITHDRAW = 50000;

function openWithdraw(){
  if(userBalance < MIN_WITHDRAW) return showToast("Min 50k pts");
  document.getElementById('withdrawPopup').style.display='block';
  document.getElementById('withdrawPoints').innerText=userBalance;
}

function closeWithdraw(){
  document.getElementById('withdrawPopup').style.display='none';
}

function submitWithdraw(){
  let method=document.getElementById('withdrawMethod').value;
  let details=document.getElementById('withdrawDetails').value;

  if(!details) return showToast("Enter details");

  tg.sendData(JSON.stringify({action:"withdraw",amount:MIN_WITHDRAW,method,details}));

  userBalance -= MIN_WITHDRAW;
  saveBalance();

  showToast("Withdraw sent");
  closeWithdraw();
}
</script>

<script async src="https://adsgram.io/js/ad.js"></script>

</body>
</html>
