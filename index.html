<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hazex Games Hub</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#00ADB5;
    color:#000;
}

.dashboard{
    padding:10px;
    background:#111;
    margin:10px;
    border-radius:10px;
}

.stat{
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    background:#00ADB5;
}

/* GAME */
#gameScreen{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="navbar">
    <h3>🎮 Hazex Hub</h3>
    <div>💰 <span id="balance">0</span></div>
</div>

<div class="dashboard">
    <div class="stat">👤 ID: <span id="uid"></span></div>
    <div class="stat">⏳ Bonus Timer: <span id="timer">Ready</span></div>

    <button onclick="startGame()">▶ Play Subway</button>
    <button onclick="claimPlay()">🎯 Claim Play Reward</button>
    <button onclick="dailyBonus()">🎁 Daily Bonus</button>
    <button onclick="watchAd()">🎁 Bonus Reward</button>
    <button onclick="copyRef()">👥 Invite</button>
    <button onclick="openWithdraw()">💸 Withdraw</button>
</div>

<div id="gameScreen">
<button onclick="exitGame()">⬅ Back</button>
<iframe id="frame"></iframe>
</div>

<div id="withdrawBox" style="display:none;padding:10px;">
<h3>Withdraw</h3>

<select id="method">
<option>Litecoin</option>
<option>USDT TRC20</option>
</select>

<input id="address" placeholder="Wallet Address" style="width:100%;padding:8px;margin-top:10px;">

<button onclick="submitWithdraw()">Submit</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*99999);
document.getElementById("uid").innerText = userId;

let balance = parseInt(localStorage.getItem("balance")) || 0;
document.getElementById("balance").innerText = balance;

/* GAME */
let playStart = 0;

function startGame(){
    document.getElementById("gameScreen").style.display="block";
    document.getElementById("frame").src =
    "https://freeonlinegames.github.io/subway-surfers-tokyo/";

    playStart = Date.now();
}

function exitGame(){
    document.getElementById("gameScreen").style.display="none";
}

/* PLAY REWARD */
let lastPlay = localStorage.getItem("play") || 0;

function claimPlay(){
    let now = Date.now();

    if(now - playStart < 60000){
        alert("Play at least 1 minute");
        return;
    }

    if(now - lastPlay < 60000){
        alert("Wait before next reward");
        return;
    }

    balance += 20;
    localStorage.setItem("balance",balance);
    document.getElementById("balance").innerText = balance;

    lastPlay = now;
    localStorage.setItem("play",lastPlay);
}

/* DAILY */
let lastDaily = localStorage.getItem("daily") || 0;

function dailyBonus(){
    let now = Date.now();

    if(now - lastDaily < 86400000){
        alert("Come back tomorrow");
        return;
    }

    balance += 30;
    localStorage.setItem("balance",balance);
    document.getElementById("balance").innerText = balance;

    lastDaily = now;
    localStorage.setItem("daily",lastDaily);
}

/* ADS SAFE */
let lastAd = 0;
let cooldown = 180000;

function watchAd(){
    let now = Date.now();

    if(now - lastAd < cooldown){
        alert("Wait before next bonus");
        return;
    }

    if(typeof Adsgram === "undefined") return;

    Adsgram.showRewardedAd({
        blockId:"YOUR_BLOCK_ID"
    }).then(()=>{
        balance += 10;
        localStorage.setItem("balance",balance);
        document.getElementById("balance").innerText = balance;

        lastAd = now;
    });
}

/* REF */
function copyRef(){
    let link = "https://t.me/YOURBOT?start="+userId;
    navigator.clipboard.writeText(link);
    alert("Invite link copied");
}

/* WITHDRAW */
function openWithdraw(){
    document.getElementById("withdrawBox").style.display="block";
}

function submitWithdraw(){
    if(balance < 15000){
        alert("Minimum 15,000 points");
        return;
    }

    let method = document.getElementById("method").value;
    let address = document.getElementById("address").value;

    if(!address)return;

    tg.sendData(`Withdraw\n${method}\n${address}\nID:${userId}`);
}
</script>

</body>
</html>
